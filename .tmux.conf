# tmuxのプリフィックスキー
# 例: Ctrl+a に変更する場合
set -g prefix C-x
unbind C-b
bind C-x send-prefix


# Emacsライクなペイン操作（プリフィックスが C-x なので C-x 2 などで操作可能）
bind 2 split-window -v         # C-x 2: 上下に分割（Emacs の C-x 2 相当）
bind 3 split-window -h         # C-x 3: 左右に分割（Emacs の C-x 3 相当）
bind 1 resize-pane -Z          # C-x 1: 現在のペインを最大化トグル（Emacs の C-x 1 相当）
bind 0 kill-pane               # C-x 0: 現在のペインを閉じる（Emacs の C-x 0 相当）
bind o select-pane -t :.+      # C-x o: 次のペインへ切り替え（Emacs の C-x o 相当）

# ウィンドウ内のペイン移動を hjkl で行う
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# アクティブペインの枠線の色（非アクティブは暗く）
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39   # 明るい水色

# ペイン番号の表示時間
set -g display-panes-time 2000

#マウス操作を有効にする
set -g mouse on

